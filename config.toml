[data]
source = "yfinance"
ticker_suffix = ".IS"
symbols_file = "portfolio.csv"
history_period = "1y"

[indicators]
ema_short = 12
ema_long = 26
rsi_period = 14
macd_signal = 9

[scoring]
rsi_oversold = 30
rsi_overbought = 70

[output]
excel_path = "output/sonuclar.xlsx"

[scanner]
min_average_volume = 100000

[portfolio_analysis]
single_position_threshold_pct = 25
top3_threshold_pct = 60
